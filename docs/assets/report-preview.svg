<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Repo Doctor report preview</title>
  <desc id="desc">A preview of the Repo Doctor health report dashboard with score, category cards, findings, and strengths.</desc>
  <rect width="1200" height="720" fill="#f6f8fb"/>
  <rect x="48" y="44" width="1104" height="632" rx="18" fill="#ffffff" stroke="#d9dee8" stroke-width="2"/>
  <text x="86" y="98" fill="#5d6778" font-family="Inter, Arial, sans-serif" font-size="24">Repo Doctor Report</text>
  <text x="86" y="156" fill="#17202a" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="700">repo-doctor</text>
  <text x="86" y="198" fill="#5d6778" font-family="Inter, Arial, sans-serif" font-size="22">Evidence-first checks for documentation, CI, testing, maintainability, security, and open-source readiness.</text>

  <rect x="86" y="238" width="250" height="122" rx="10" fill="#f8fbff" stroke="#d9dee8"/>
  <text x="112" y="306" fill="#16794c" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="700">100/100</text>
  <text x="112" y="338" fill="#5d6778" font-family="Inter, Arial, sans-serif" font-size="20">Health score</text>

  <rect x="360" y="238" width="210" height="122" rx="10" fill="#fff8e8" stroke="#ffd28a"/>
  <text x="386" y="306" fill="#9a5b00" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="700">0</text>
  <text x="386" y="338" fill="#5d6778" font-family="Inter, Arial, sans-serif" font-size="20">Warnings</text>

  <rect x="594" y="238" width="210" height="122" rx="10" fill="#fff0ee" stroke="#f4b5ae"/>
  <text x="620" y="306" fill="#b42318" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="700">0</text>
  <text x="620" y="338" fill="#5d6778" font-family="Inter, Arial, sans-serif" font-size="20">Critical issues</text>

  <rect x="828" y="238" width="238" height="122" rx="10" fill="#eef4ff" stroke="#b8ccff"/>
  <text x="854" y="306" fill="#2458c7" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="700">6</text>
  <text x="854" y="338" fill="#5d6778" font-family="Inter, Arial, sans-serif" font-size="20">Evidence categories</text>

  <text x="86" y="414" fill="#17202a" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Category Scores</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="86" y="442" width="318" height="70" rx="8" fill="#ffffff" stroke="#d9dee8"/>
    <text x="110" y="486" fill="#17202a" font-size="22" font-weight="700">Documentation</text>
    <text x="328" y="486" fill="#16794c" font-size="22" font-weight="700">100</text>
    <rect x="86" y="528" width="318" height="70" rx="8" fill="#ffffff" stroke="#d9dee8"/>
    <text x="110" y="572" fill="#17202a" font-size="22" font-weight="700">Testing</text>
    <text x="328" y="572" fill="#16794c" font-size="22" font-weight="700">100</text>
    <rect x="432" y="442" width="318" height="70" rx="8" fill="#ffffff" stroke="#d9dee8"/>
    <text x="456" y="486" fill="#17202a" font-size="22" font-weight="700">CI/CD</text>
    <text x="674" y="486" fill="#16794c" font-size="22" font-weight="700">100</text>
    <rect x="432" y="528" width="318" height="70" rx="8" fill="#ffffff" stroke="#d9dee8"/>
    <text x="456" y="572" fill="#17202a" font-size="22" font-weight="700">Security</text>
    <text x="674" y="572" fill="#16794c" font-size="22" font-weight="700">100</text>
  </g>

  <text x="792" y="414" fill="#17202a" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Top Findings</text>
  <rect x="792" y="442" width="274" height="156" rx="10" fill="#f8fbff" stroke="#d9dee8"/>
  <circle cx="828" cy="486" r="13" fill="#16794c"/>
  <path d="M821 486.5L826.5 492L836 480" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="856" y="492" fill="#17202a" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">No issues found</text>
  <text x="822" y="540" fill="#5d6778" font-family="Inter, Arial, sans-serif" font-size="19">Reports include file and line</text>
  <text x="822" y="568" fill="#5d6778" font-family="Inter, Arial, sans-serif" font-size="19">evidence for every finding.</text>
</svg>
