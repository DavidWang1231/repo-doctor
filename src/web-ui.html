<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Repo Doctor Web</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #16181d;
      --muted: #626b78;
      --line: #d9dee7;
      --paper: #f5f6f2;
      --panel: #ffffff;
      --soft: #edf3f5;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --blue: #2458c7;
      --bad: #b42318;
      --warn: #9a5b00;
      --good: #16794c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.5;
    }

    button,
    input,
    select {
      font: inherit;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 48px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      padding: 12px 0 18px;
      border-bottom: 1px solid var(--line);
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 6px;
      font-size: 2rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    h2 {
      margin-bottom: 12px;
      font-size: 1.05rem;
    }

    h3 {
      margin-bottom: 6px;
      font-size: .98rem;
    }

    .muted {
      color: var(--muted);
    }

    .version {
      color: var(--muted);
      font-size: .9rem;
      white-space: nowrap;
    }

    .scan-panel {
      margin: 22px 0 18px;
      padding: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    form {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(210px, 280px) auto;
      gap: 12px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: .9rem;
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--ink);
      background: #fff;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--ink);
      background: #fff;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent);
      color: #fff;
      background: var(--accent);
      font-weight: 700;
    }

    button.primary:hover {
      background: var(--accent-strong);
    }

    button:disabled {
      cursor: wait;
      opacity: .65;
    }

    .hint {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: .92rem;
    }

    .status {
      min-height: 24px;
      margin: 0 0 12px;
      color: var(--muted);
    }

    .status.error {
      color: var(--bad);
      font-weight: 700;
    }

    .results {
      display: none;
      gap: 14px;
    }

    .results.visible {
      display: grid;
    }

    .summary-grid,
    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric,
    .section,
    .finding,
    .download-row,
    .category {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .metric {
      min-height: 102px;
      padding: 14px;
    }

    .metric strong {
      display: block;
      margin-bottom: 8px;
      font-size: 1.8rem;
      line-height: 1;
    }

    .metric .score {
      color: var(--good);
    }

    .metric .score.warn {
      color: var(--warn);
    }

    .metric .score.bad {
      color: var(--bad);
    }

    .section {
      padding: 16px;
    }

    .download-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
    }

    .download-row button {
      min-height: 36px;
      font-size: .92rem;
    }

    .category {
      padding: 12px;
    }

    .bar {
      height: 8px;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #e6ebf0;
    }

    .bar span {
      display: block;
      width: var(--value);
      height: 100%;
      background: var(--color);
    }

    .finding {
      padding: 14px;
      margin-bottom: 10px;
    }

    .finding-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 76px;
      min-height: 26px;
      border-radius: 999px;
      padding: 0 9px;
      font-size: .72rem;
      font-weight: 800;
      text-transform: uppercase;
      border: 1px solid transparent;
    }

    .badge.critical {
      color: var(--bad);
      border-color: #f1b4ad;
      background: #fff0ee;
    }

    .badge.warning {
      color: var(--warn);
      border-color: #ffd28a;
      background: #fff8e8;
    }

    .badge.info {
      color: var(--blue);
      border-color: #b8ccff;
      background: #eef4ff;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: .9em;
      background: var(--soft);
      border-radius: 5px;
      padding: 2px 5px;
    }

    ul {
      padding-left: 20px;
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 20px, 1180px);
        padding-top: 14px;
      }

      header,
      .finding-head {
        display: block;
      }

      form,
      .summary-grid,
      .category-grid {
        grid-template-columns: 1fr;
      }

      .version {
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Repo Doctor Web</h1>
        <p class="muted">Scan a local project path or a public GitHub repository URL from your browser.</p>
      </div>
      <div class="version">v__VERSION__</div>
    </header>

    <section class="scan-panel">
      <form id="scan-form">
        <label>
          Project path or GitHub URL
          <input id="target" name="target" type="text" value="." placeholder="/Users/me/project or https://github.com/owner/repo">
        </label>
        <label>
          Project type
          <select id="profile" name="profile">
            <option value="">Auto detect</option>
            __PROFILE_OPTIONS__
          </select>
        </label>
        <button id="scan-button" class="primary" type="submit">Scan</button>
      </form>
      <p class="hint">Remote scans clone public GitHub repos into a temporary folder, scan them, then remove the temporary copy.</p>
    </section>

    <p id="status" class="status"></p>

    <section id="results" class="results" aria-live="polite">
      <div class="summary-grid" id="summary-grid"></div>
      <div class="download-row" id="download-row">
        <button data-download="html" type="button">Download HTML</button>
        <button data-download="markdown" type="button">Download Markdown</button>
        <button data-download="json" type="button">Download JSON</button>
        <button data-download="summary" type="button">Download Summary</button>
        <button data-download="fixPrompt" type="button">Download AI Fix Prompt</button>
      </div>
      <section class="section">
        <h2>Category Scores</h2>
        <div class="category-grid" id="category-grid"></div>
      </section>
      <section class="section">
        <h2>Findings</h2>
        <div id="findings"></div>
      </section>
      <section class="section">
        <h2>Skipped Checks</h2>
        <div id="skipped"></div>
      </section>
    </section>
  </main>

  <script>
    const form = document.querySelector("#scan-form");
    const targetInput = document.querySelector("#target");
    const profileInput = document.querySelector("#profile");
    const scanButton = document.querySelector("#scan-button");
    const statusEl = document.querySelector("#status");
    const resultsEl = document.querySelector("#results");
    const summaryGrid = document.querySelector("#summary-grid");
    const categoryGrid = document.querySelector("#category-grid");
    const findingsEl = document.querySelector("#findings");
    const skippedEl = document.querySelector("#skipped");
    const downloadRow = document.querySelector("#download-row");
    let lastResult = null;

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      await runScan();
    });

    downloadRow.addEventListener("click", (event) => {
      const key = event.target?.dataset?.download;
      if (!key || !lastResult) {
        return;
      }

      const names = {
        html: "report.html",
        markdown: "report.md",
        json: "report.json",
        summary: "summary.md",
        fixPrompt: "fix-prompt.md"
      };
      const types = {
        html: "text/html",
        markdown: "text/markdown",
        json: "application/json",
        summary: "text/markdown",
        fixPrompt: "text/markdown"
      };

      downloadText(names[key], lastResult.downloads[key], types[key]);
    });

    async function runScan() {
      setBusy(true);
      setStatus("Scanning repository...");
      resultsEl.classList.remove("visible");

      try {
        const response = await fetch("/api/scan", {
          method: "POST",
          headers: {
            "content-type": "application/json"
          },
          body: JSON.stringify({
            target: targetInput.value.trim() || ".",
            profile: profileInput.value || null
          })
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Scan failed.");
        }

        lastResult = payload;
        renderResult(payload.report);
        setStatus("Scan complete.");
      } catch (error) {
        setStatus(error.message || "Scan failed.", true);
      } finally {
        setBusy(false);
      }
    }

    function renderResult(report) {
      const critical = report.findings.filter((finding) => finding.severity === "critical").length;
      const warnings = report.findings.filter((finding) => finding.severity === "warning").length;
      const profile = report.project.profile;

      summaryGrid.innerHTML = [
        metric(scoreMarkup(report.score), "Health score"),
        metric(critical, "Critical findings"),
        metric(warnings, "Warnings"),
        metric(escapeHtml(profile?.label || "Unknown"), "Project type")
      ].join("");

      categoryGrid.innerHTML = Object.values(report.categories)
        .map((category) => {
          const color = scoreColor(category.score);
          return '<article class="category">' +
            '<h3>' + escapeHtml(category.label) + '</h3>' +
            '<strong>' + category.score + '/100</strong>' +
            '<p class="muted">' + category.findings + ' finding(s)</p>' +
            '<div class="bar" style="--value: ' + category.score + '%; --color: ' + color + ';"><span></span></div>' +
            '</article>';
        })
        .join("");

      findingsEl.innerHTML = report.findings.length === 0
        ? '<p class="muted">No issues found.</p>'
        : report.findings.slice(0, 20).map(renderFinding).join("");

      skippedEl.innerHTML = report.skipped?.length
        ? '<ul>' + report.skipped.map((item) => '<li><strong>' + escapeHtml(item.title) + ':</strong> ' + escapeHtml(item.reason) + '</li>').join("") + '</ul>'
        : '<p class="muted">No checks were skipped.</p>';

      resultsEl.classList.add("visible");
    }

    function renderFinding(finding) {
      const evidence = finding.evidence?.length
        ? '<ul>' + finding.evidence.map((entry) => {
          const detail = entry.detail ? ' ' + escapeHtml(entry.detail) : '';
          return '<li><code>' + escapeHtml(entry.file) + ':' + entry.line + '</code>' + detail + '</li>';
        }).join("") + '</ul>'
        : '';

      return '<article class="finding">' +
        '<div class="finding-head">' +
          '<div><h3>' + escapeHtml(finding.title) + '</h3><p class="muted">' + escapeHtml(finding.category) + '</p></div>' +
          '<span class="badge ' + escapeHtml(finding.severity) + '">' + escapeHtml(finding.severity) + '</span>' +
        '</div>' +
        '<p>' + escapeHtml(finding.summary) + '</p>' +
        '<p><strong>Recommendation:</strong> ' + escapeHtml(finding.recommendation) + '</p>' +
        evidence +
      '</article>';
    }

    function metric(value, label) {
      return '<article class="metric"><strong>' + value + '</strong><span class="muted">' + escapeHtml(label) + '</span></article>';
    }

    function scoreMarkup(score) {
      const className = score >= 80 ? "score" : score >= 60 ? "score warn" : "score bad";
      return '<span class="' + className + '">' + score + '/100</span>';
    }

    function scoreColor(score) {
      if (score >= 80) {
        return "#16794c";
      }
      if (score >= 60) {
        return "#9a5b00";
      }
      return "#b42318";
    }

    function setBusy(isBusy) {
      scanButton.disabled = isBusy;
      scanButton.textContent = isBusy ? "Scanning..." : "Scan";
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function downloadText(filename, content, type) {
      const blob = new Blob([content], { type: type + ";charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
